backend:
  primary: go
  language: go
  version: "1.25"
  devcontainer_tag: "1.25"
  module_system: go-modules
  linter: golangci-lint
  formatter: gofmt
  testing:
    primary: go-test
    conventions:
      - test-files-end-_test.go
      - table-driven-with-t.Run-subtests
      - external-test-packages-foo_test-for-public-API
  commands:
    format: "gofmt -w ."
    format_check: "test -z \"$(gofmt -l .)\""
    lint: "golangci-lint run ./..."
    typecheck: "go vet ./..."
    test_unit: "go test -race -short ./..."
    test_integration: "go test -race -tags=integration ./..."
