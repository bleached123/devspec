vscode:
  settings:
    editor.formatOnSave: true
    editor.tabSize: 4
    editor.insertSpaces: true
    editor.rulers: [100]
    files.trimTrailingWhitespace: true
    files.insertFinalNewline: true
    python.analysis.typeCheckingMode: strict
    python.analysis.autoImportCompletions: true
    "[python]":
      editor.defaultFormatter: charliermarsh.ruff
      editor.codeActionsOnSave:
        source.organizeImports.ruff: explicit
  extensions:
    - ms-python.python
    - ms-python.vscode-pylance
    - charliermarsh.ruff
    - ms-python.debugpy
    - editorconfig.editorconfig
  tasks:
    - label: install
      type: shell
      command: uv
      args: ["sync"]
    - label: test
      type: shell
      command: uv
      args: ["run", "pytest"]
      group:
        kind: test
        isDefault: true
    - label: lint
      type: shell
      command: uv
      args: ["run", "ruff", "check", "."]
devcontainer:
  name: python
  image: mcr.microsoft.com/devcontainers/python:${backend.devcontainer_tag}
  features:
    "ghcr.io/devcontainers/features/git:1": {}
  customizations:
    vscode:
      extensions:
        - ms-python.python
        - charliermarsh.ruff
  postCreateCommand: pip install uv && uv sync
